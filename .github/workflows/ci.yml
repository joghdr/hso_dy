name: hso_dy ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up
        uses: docker/setup-buildx-action@v3

      - name: metadata
        id: meta
        run: |
          echo "HSO_VERSION=$(cat hso_engine/VERSION)" >> $GITHUB_OUTPUT
          echo "HSO_IMAGE_NAME=$(grep -oP 'set[[:space:]]*\([[:space:]]*ENGINE_TARGET \K[^)]+' hso_engine/CMakeLists.txt | tr -d '"')" >> $GITHUB_OUTPUT

      - name: build and verify via cmake orchestration
        run: |
          cmake --preset release -S hso_engine
          cmake --build --preset release --target hso_docker_image_engine
          

      - name: status
        run: echo "CI Verification OK"
